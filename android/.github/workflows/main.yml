name: Final Manual Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build APK
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap add android || true
          # نسخ الملفات التي سيجدها GitHub في مستودعك
          mkdir -p android/app/src/main/assets/public
          if [ -d "dist" ]; then cp -r dist/* android/app/src/main/assets/public/;
          elif [ -d "build" ]; then cp -r build/* android/app/src/main/assets/public/;
          fi
          chmod +x android/gradlew
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> android/build.gradle
          cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Fixed-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
