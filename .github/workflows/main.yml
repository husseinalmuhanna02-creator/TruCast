name: Build TruCast APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web Project
        run: |
          npm install
          # اللمسة السحرية: إجبار Vite على استخدام المسارات النسبية ./
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          # التأكد من مجلد dist
          if [ -d "build" ] && [ ! -d "dist" ]; then mv build dist; fi

      - name: Setup Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          if [ ! -d "android" ]; then
            npx cap init TruCast com.hussein.trucast --web-dir dist
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> android/build.gradle
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
