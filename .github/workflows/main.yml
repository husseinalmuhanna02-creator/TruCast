name: Final Bulletproof Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and Packaging
        run: |
          # بناء الويب
          npm install
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # إنشاء ملف الهوية (هنا حل مشكلة Missing appId)
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          
          # إضافة الأندرويد
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap add android || true
          
          # الحقن اليدوي العنيف (لضمان الحجم والعمل)
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/ || cp -r build/* android/app/src/main/assets/public/
          
          # إصلاح الكوتلن والبناء
          chmod +x android/gradlew
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> android/build.gradle
          cd android && ./gradlew assembleDebug
          
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-Victory
          path: android/app/build/outputs/apk/debug/app-debug.apk
