name: TruCast Verified Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Build Web
        run: |
          npm install
          npm run build
          if [ -f "dist/index.html" ]; then
            sed -i 's|="/|="./|g' dist/index.html
            sed -i "s|='/|='./|g" dist/index.html
          fi

      - name: Capacitor & Keystore Protection
        run: |
          # حفظ نسخة من البصمة قبل مسح المجلد
          cp android/app/debug.keystore ./backup_debug.keystore || echo "No keystore to backup"
          npm install @capacitor/cli @capacitor/core @capacitor/android
          rm -rf android capacitor.config.json
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          npx cap add android
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/
          # إعادة البصمة لمكانها الصحيح
          mkdir -p android/app
          cp ./backup_debug.keystore android/app/debug.keystore || echo "Keystore restored"

      - name: Fix Kotlin Duplicates & Build APK
        run: |
          # إضافة حل مشكلة تكرار مكتبات Kotlin
          cat << 'GRADLE' >> android
cd ~/storage/shared/TruCast

# إعادة بناء ملف main.yml بنسخة احترافية ومصححة
cat << 'EOF' > .github/workflows/main.yml
name: TruCast Verified Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Build Web
        run: |
          npm install
          npm run build
          if [ -f "dist/index.html" ]; then
            sed -i "s|=\"/|=\"./|g" dist/index.html
            sed -i "s|='/|='./|g" dist/index.html
          fi

      - name: Capacitor & Keystore Protection
        run: |
          cp android/app/debug.keystore ./backup_debug.keystore || echo "No keystore"
          npm install @capacitor/cli @capacitor/core @capacitor/android
          rm -rf android capacitor.config.json
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          npx cap add android
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/
          mkdir -p android/app
          cp ./backup_debug.keystore android/app/debug.keystore || echo "Keystore restored"

      - name: Fix Kotlin & Build APK
        run: |
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22' } } } " >> android/build.gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Verified-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
