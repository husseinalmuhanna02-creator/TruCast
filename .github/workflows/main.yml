name: TruCast Absolute Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Build Web & Force Paths
        run: |
          npm install
          npm run build
          
          # تعديل عنيف ومباشر على ملف index.html لقتل الشاشة البيضاء تماماً
          if [ -f "dist/index.html" ]; then
            sed -i 's|="/|="./|g' dist/index.html
            sed -i "s|='/|='./|g" dist/index.html
            echo "تم تعديل المسارات بنجاح!"
          fi

      - name: 2. Capacitor & Asset Injection
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # تنظيف كامل وإعادة تهيئة
          rm -rf android capacitor.config.json
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          
          npx cap add android
          
          # النسخ الجبري لكل الملفات (النقطة بعد dist تعني نسخ المحتوى بالكامل)
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/
          
          # طباعة حجم الملفات المدمجة للتأكد
          echo "--- حجم مجلد الأصول داخل الأندرويد ---"
          du -sh android/app/src/main/assets/public

      - name: 3. Kotlin Shield & Build APK
        run: |
          cat << 'GRADLE' >> android/build.gradle
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  }
              }
          }
          GRADLE
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # طباعة الحجم النهائي للتطبيق
          echo "--- حجم تطبيق APK النهائي ---"
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Massive-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
