name: Final Success Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Everything
        run: |
          npm install
          # إصلاح Vite للمسارات النسبية ./
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # تحديد مجلد الويب الناتج (dist أو build)
          if [ -d "dist" ]; then export DIR="dist"; else export DIR="build"; fi
          
          # تجهيز الأندرويد ودمج الملفات يدوياً وبقوة
          npm install @capacitor/cli @capacitor/android
          npx cap add android || true
          mkdir -p android/app/src/main/assets/public
          cp -r $DIR/* android/app/src/main/assets/public/
          
          # حل نزاع الكوتلن
          chmod +x android/gradlew
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> android/build.gradle
          
          cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
