name: TruCast Native Pro Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Build Web
        run: |
          npm install --legacy-peer-deps
          npm run build || (echo "فشل البناء البرمجي - تفقد كود App.tsx" && exit 1)

      - name: Capacitor Setup
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          rm -rf android capacitor.config.json
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist"}' > capacitor.config.json
          npx cap add android
          cp google-services.json android/app/google-services.json
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/

      - name: Build APK
        run: |
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } } " >> android/build.gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Fixed-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
