name: TruCast Final Victory
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Install & Build Web
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm run build

      - name: 2. Setup Android Project
        run: |
          rm -rf android
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","plugins":{"FirebaseAuthentication":{"skipNativeAuth":false,"providers":["google.com"]}}}' > capacitor.config.json
          npx cap add android
          npx cap sync android

      - name: 3. Inject Firebase Identity
        run: |
          # نسخ الملف من المجلد الرئيسي إلى داخل مجلد الأندرويد
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "✅ Google Services JSON Injected"
          else
            echo "❌ CRITICAL: google-services.json NOT FOUND"
            exit 1
          fi

      - name: 4. Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Success-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
