name: TruCast SHA-1 Extraction
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Install & Build
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm run build

      - name: 2. Sync Android
        run: |
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","plugins":{"FirebaseAuthentication":{"skipNativeAuth":false,"providers":["google.com"]}}}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: 3. Extract SHA-1 (The Official Way)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport | grep -A 5 "Variant: debug"

      - name: 4. Final APK
        run: |
          cd android
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-With-SHA1-In-Logs
          path: android/app/build/outputs/apk/debug/app-debug.apk
