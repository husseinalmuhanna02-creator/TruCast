name: TruCast Verified Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Build Web
        run: |
          npm install
          npm run build
          if [ -f "dist/index.html" ]; then
            sed -i 's|="/|="./|g' dist/index.html
            sed -i "s|='/|='./|g" dist/index.html
          fi

      - name: Capacitor Android Setup
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          rm -rf android capacitor.config.json
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          npx cap add android
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/

      - name: Inject Keystore
        run: |
          # نقل ملف البصمة من مشروعك إلى مكان البناء
          mkdir -p android/app/
          cp android/app/debug.keystore android/app/debug.keystore || echo "Keystore already exists"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
