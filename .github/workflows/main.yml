name: Build TruCast APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Setup Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          if [ ! -d "android" ]; then
            npx cap init TruCast com.hussein.trucast --web-dir dist
            npx cap add android
          fi
      - name: Build APK
        run: |
          chmod +x android/gradlew
          # إجبار جميع مكتبات كوتلن على نسخة موحدة لإنهاء النزاع
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22' } } }" >> android/build.gradle
          npx cap sync android
          cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
