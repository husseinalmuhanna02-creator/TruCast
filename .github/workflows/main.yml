name: TruCast Final Victory
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: 2. Build Web Assets
        run: npm run build

      - name: 3. Create Clean Android Project
        run: |
          # مسح أي مجلد أندرويد قديم لضمان بناء نظيف
          rm -rf android
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist"}' > capacitor.config.json
          # إضافة الأندرويد من جديد وبقوة
          npx cap add android
          npx cap sync android

      - name: 4. Inject Google Identity
        run: |
          cp google-services.json android/app/google-services.json || echo "JSON Missing"
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/

      - name: 5. Build Final APK
        run: |
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } } " >> android/build.gradle
          cd android
          # الآن سيعثر السيرفر على gradlew حتماً
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Official-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
