name: Build TruCast APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web Project
        run: |
          npm install
          # إصلاح Vite للمسارات النسبية
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # التأكد من وجود ملفات الويب (هنا السر!)
          if [ ! -d "dist" ] && [ -d "build" ]; then mv build dist; fi
          if [ ! -f "dist/index.html" ]; then echo "Error: Web files not found!" && exit 1; fi
          
          # عرض حجم المجلد للتأكد (سيظهر في السجلات)
          du -sh dist/

      - name: Setup Capacitor and Force Sync
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          if [ ! -d "android" ]; then
            npx cap init TruCast com.hussein.trucast --web-dir dist
            npx cap add android
          fi
          
          # إجبار التزامن ونسخ الملفات يدوياً لمجلد الأصول في الأندرويد
          npx cap sync android
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/

      - name: Nuclear Fix for Kotlin Conflict
        run: |
          cat << 'GRADLE' >> android/build.gradle
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                  }
              }
          }
          GRADLE
          chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TruCast-Real-Size-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
