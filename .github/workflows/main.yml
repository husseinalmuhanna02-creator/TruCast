name: TruCast Final Victory
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and Fix
        run: |
          npm install
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # إنشاء الهوية
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          
          # تجهيز الأندرويد
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap add android || true
          
          # الحقن اليدوي للأصول (لضمان الحجم)
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          
          # الحل الجذري لنزاع الكوتلن (تعديل ملف build.gradle الرئيسي)
          cat << 'GRADLE' > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.1'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22" }
          }
          allprojects {
              repositories { google(); mavenCentral() }
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion "1.8.22"
                      }
                  }
              }
          }
          GRADLE
          
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug
          
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
