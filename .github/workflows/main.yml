name: TruCast X-Ray Debugger
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Build Web & Inject Eruda Debugger
        run: |
          npm install
          npm run build
          
          # تصحيح المسارات جبرياً
          if [ -f "dist/index.html" ]; then
            sed -i 's|="/|="./|g' dist/index.html
            sed -i "s|='/|='./|g" dist/index.html
            
            # حقن أداة فحص الأخطاء (الأشعة السينية) داخل التطبيق
            sed -i 's|</head>|<script src="https://cdn.jsdelivr.net/npm/eruda"></script><script>eruda.init();</script></head>|' dist/index.html
            echo "تم حقن أداة Eruda بنجاح!"
          fi

      - name: Capacitor Injection
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          rm -rf android capacitor.config.json
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          npx cap add android
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/

      - name: Build APK
        run: |
          cat << 'GRADLE' >> android/build.gradle
          subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22' } } }
          GRADLE
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
