name: TruCast Ultimate Victory
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Install All Dependencies
        run: |
          # تثبيت كل المكتبات الأساسية والفرعية دفعة واحدة لضمان عدم نقص أي ملف
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync
        run: |
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist"}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Inject Identity & Assets
        run: |
          cp google-services.json android/app/google-services.json || echo "JSON Missing"
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/

      - name: Build APK
        run: |
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } } " >> android/build.gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Verified-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
