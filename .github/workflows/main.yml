name: Build TruCast APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web Project
        run: |
          npm install
          # إصلاح Vite للمسارات النسبية
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # --- الرادار: البحث عن مكان المجلد الناتج فعلياً ---
          REAL_DIST=$(find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/android/*" | head -n 1 | sed 's/\/index.html//' | sed 's/.\///')
          echo "تم العثور على الملفات في مجلد: $REAL_DIST"
          echo "ACTUAL_WEB_DIR=$REAL_DIST" >> $GITHUB_ENV

      - name: Force Asset Injection
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # إجبار إعدادات Capacitor على المجلد المكتشف
          echo "{\"appId\":\"com.hussein.trucast\",\"appName\":\"TruCast\",\"webDir\":\"$ACTUAL_WEB_DIR\",\"bundledWebRuntime\":false}" > capacitor.config.json
          
          npx cap init TruCast com.hussein.trucast --web-dir $ACTUAL_WEB_DIR || true
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android
          
          # الحقن اليدوي العنيف للملفات داخل الأندرويد
          mkdir -p android/app/src/main/assets/public
          cp -r $ACTUAL_WEB_DIR/* android/app/src/main/assets/public/
          
          # فحص الحجم للتأكد قبل البناء النهائي
          echo "حجم الملفات المحقونة داخل الأندرويد:"
          du -sh android/app/src/main/assets/public/

      - name: Nuclear Fix for Kotlin Conflict
        run: |
          cat << 'GRADLE' >> android/build.gradle
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                  }
              }
          }
          GRADLE
          chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
