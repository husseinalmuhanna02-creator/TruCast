name: Build TruCast APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Web Project
        run: |
          npm run build
          # تحديد المجلد الناتج بدقة
          BUILD_DIR=$(if [ -d "dist" ]; then echo "dist"; elif [ -d "build" ]; then echo "build"; else echo "www"; fi)
          if [ "$BUILD_DIR" != "dist" ]; then mv $BUILD_DIR dist; fi
          # إصلاح المسارات في index.html لضمان القراءة في الأندرويد
          sed -i 's/src="\//src="/g' dist/index.html
          sed -i 's/href="\//href="/g' dist/index.html
      - name: Setup Capacitor Config
        run: |
          # إجبار ملف الإعدادات على قراءة مجلد dist
          sed -i 's/"webDir": ".*"/"webDir": "dist"/g' capacitor.config.json || echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
      - name: Build APK
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init TruCast com.hussein.trucast --web-dir dist || true
          npx cap add android || true
          chmod +x android/gradlew
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } } }" >> android/build.gradle
          npx cap sync android
          cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
