name: TruCast SHA-1 Extraction
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Install & Build
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm run build

      - name: 2. Sync Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: 3. Extract SHA-1 (The Missing Piece)
        run: |
          echo "--- YOUR SHA-1 KEY IS BELOW ---"
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1:"
          echo "-------------------------------"

      - name: 4. Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
