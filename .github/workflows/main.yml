name: TruCast Final Victory Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # إجبار تثبيت مكتبة جوجل قبل بناء الويب
          npm install @capacitor-firebase/authentication --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Android Sync
        run: |
          # التأكد من وجود ملف الإعدادات
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist"}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Inject Google Identity & Keystore
        run: |
          cp google-services.json android/app/google-services.json || echo "Warning: JSON missing"
          mkdir -p android/app/src/main/assets/public
          cp -a dist/. android/app/src/main/assets/public/

      - name: Build APK
        run: |
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } } " >> android/build.gradle
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
