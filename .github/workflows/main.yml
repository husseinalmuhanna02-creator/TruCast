name: Build TruCast APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Hard Build Web Project
        run: |
          npm install
          # إجبار Vite على المسارات النسبية (قاتل الشاشة البيضاء)
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # فحص المجلد الناتج (هنا سنعرف الحقيقة)
          if [ -d "dist" ]; then export WEB_DIR="dist";
          elif [ -d "build" ]; then export WEB_DIR="build";
          else export WEB_DIR="www"; fi
          
          echo "WEB_DIR_FOUND=$WEB_DIR" >> $GITHUB_ENV
          du -sh $WEB_DIR/

      - name: Force Sync and Manual Injection
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          # تحديث إعدادات كاباسيتور لتشير للمجلد الصحيح
          sed -i 's/"webDir": ".*"/"webDir": "'$WEB_DIR_FOUND'"/g' capacitor.config.json || echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"'$WEB_DIR_FOUND'"}' > capacitor.config.json
          
          # إذا لم يكن مجلد أندرويد موجوداً، أنشئه
          if [ ! -d "android" ]; then
            npx cap init TruCast com.hussein.trucast --web-dir $WEB_DIR_FOUND
            npx cap add android
          fi
          
          npx cap sync android
          
          # --- العملية الجراحية: نسخ الملفات يدوياً لمجلد الأصول بالأندرويد ---
          mkdir -p android/app/src/main/assets/public
          cp -r $WEB_DIR_FOUND/* android/app/src/main/assets/public/
          
          # التأكد من حجم مجلد الأصول داخل الأندرويد
          du -sh android/app/src/main/assets/public/

      - name: Nuclear Fix for Kotlin Conflict
        run: |
          cat << 'GRADLE' >> android/build.gradle
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                  }
              }
          }
          GRADLE
          chmod +x android/gradlew

      - name: Build Final APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-V5-RealSize
          path: android/app/build/outputs/apk/debug/app-debug.apk
