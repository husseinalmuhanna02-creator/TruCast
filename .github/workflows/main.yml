name: TruCast SHA-1 Final Success
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Install & Build Web
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor-firebase/authentication --legacy-peer-deps
          npm run build

      - name: 2. Extract SHA-1 (DIRECT ACCESS)
        run: |
          echo "--- YOUR SHA-1 KEY IS BELOW ---"
          # استخراج البصمة مباشرة من مفتاح أندرويد الافتراضي في السيرفر
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1:"
          echo "-------------------------------"

      - name: 3. Create Android & Sync
        run: |
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","plugins":{"FirebaseAuthentication":{"skipNativeAuth":false,"providers":["google.com"]}}}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: 4. Build Final APK
        run: |
          cd android
          cp ../google-services.json app/google-services.json || echo "Warning: JSON missing"
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } } " >> build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-With-SHA1-Ready
          path: android/app/build/outputs/apk/debug/app-debug.apk
