name: TruCast Signature Reveal
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Build & Clean Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm run build
          rm -rf android
          npx cap add android
          npx cap sync android
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
          fi

      - name: 2. Generate Keystore & Reveal SHA Keys 🔑
        run: |
          # صنع مجلد المفاتيح إذا لم يكن موجوداً
          mkdir -p /home/runner/.config/.android
          # إنشاء مفتاح تجريبي للسيرفر لكي يظهر لنا الأكواد
          keytool -genkey -v -keystore /home/runner/.config/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          cd android
          chmod +x gradlew
          ./gradlew signingReport

      - name: 3. Build Final APK
        run: |
          cd android
          echo "ext { androidxCredentialsVersion = '1.3.0'; rgcfaIncludeGoogle = true }" >> build.gradle
          mkdir -p ~/.android && cp ../.keys/debug.keystore ~/.android/debug.keystore
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/.keys/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-V67
          path: android/app/build/outputs/apk/debug/app-debug.apk
