name: TruCast Perfect Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and Package
        run: |
          # 1. بناء ملفات الويب الخاصة بك
          npm install
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # 2. إنشاء الهوية وتجهيز كاباسيتور
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # 3. الضربة الذكية: مسح الأندرويد القديم وبناء واحد أصلي وجديد
          rm -rf android
          npx cap add android
          
          # 4. حقن ملفاتك (الـ 3 ميجا) بالقوة لقتل الشاشة البيضاء
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          
          # 5. إضافة درع الكوتلن في نهاية الملف (بدون مسح الأساسيات)
          cat << 'GRADLE' >> android/build.gradle
          
          subprojects {
              configurations.all {
                  resolutionStrategy {
                          force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                          force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                          force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  }
              }
          }
          GRADLE
          
          # 6. البناء النهائي
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug
          
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Complete-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
