name: TruCast SHA-1 Final Success
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 1. Install & Build Web
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-firebase/authentication --legacy-peer-deps
          npm run build

      - name: 2. Setup Android
        run: |
          rm -rf android
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","plugins":{"FirebaseAuthentication":{"skipNativeAuth":false,"providers":["google.com"]}}}' > capacitor.config.json
          npx cap add android
          npx cap sync android

      - name: 3. Build APK First (To Create Keystore)
        run: |
          cd android
          cp ../google-services.json app/google-services.json || echo "JSON Missing"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 4. Extract SHA-1 (The Official Report)
        run: |
          cd android
          ./gradlew signingReport | grep -A 20 "Variant: debug"

      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-Package
          path: android/app/build/outputs/apk/debug/app-debug.apk
