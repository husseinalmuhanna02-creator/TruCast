name: TruCast Final Victory
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and Fix
        run: |
          # بناء الويب وتجهيز المسارات
          npm install
          if [ -f "vite.config.js" ]; then
            sed -i "s|defineConfig({|defineConfig({ base: './',|g" vite.config.js
          fi
          npm run build
          
          # إنشاء ملف الهوية
          echo '{"appId":"com.hussein.trucast","appName":"TruCast","webDir":"dist","bundledWebRuntime":false}' > capacitor.config.json
          
          # إعداد Capacitor وحقن الملفات يدوياً
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap add android || true
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          
          # ترميم ملف build.gradle الرئيسي (إضافة المتغيرات المفقودة compileSdkVersion)
          cat << 'GRADLE' > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22"
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          ext {
              compileSdkVersion = 34
              targetSdkVersion = 34
              minSdkVersion = 22
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  }
              }
          }
          GRADLE
          
          # بناء الـ APK
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug
          
      - uses: actions/upload-artifact@v4
        with:
          name: TruCast-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
